<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="보드게임타이머">
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>보드게임 타이머</title>
    <style>
        :root { --bg-green: #27ae60; --bg-orange: #f39c12; --bg-red: #e74c3c; --bg-dark: #2c3e50; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; height: -webkit-fill-available; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: white; overflow: hidden; touch-action: manipulation; }
        .screen { width: 100vw; height: 100dvh; position: absolute; top: 0; left: 0; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }

        #setup-screen { background: #34495e; z-index: 10; overflow-y: auto; padding-top: env(safe-area-inset-top); }
        .setup-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; margin: 40px auto; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        .btn-main { background: var(--bg-green); color: white; border: none; padding: 16px; width: 100%; max-width: 260px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin: 15px auto; display: block; }

        #game-screen { background-color: var(--bg-green); cursor: pointer; text-align: center; z-index: 5; transition: background-color 0.1s; padding: 20px; }
        #player-name-display { font-size: 1.6rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 25px; border-radius: 50px; margin-bottom: 10px; }
        #time-display { font-weight: 900; line-height: 1; }
        
        .game-controls { display: flex; gap: 8px; z-index: 10; width: 100%; max-width: 450px; }
        .btn-control { padding: 18px 10px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1rem; border: 2px solid white; color: white; background: rgba(255,255,255,0.25); flex: 1; backdrop-filter: blur(4px); }

        @media (orientation: portrait) {
            #game-screen { flex-direction: column; justify-content: space-between; padding-top: calc(12dvh + env(safe-area-inset-top)); padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
            #game-main-area { flex: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; }
            #time-display { font-size: 42vw; }
            .game-controls { flex-direction: row; padding: 0 10px; }
        }
        @media (orientation: landscape) {
            #game-screen { flex-direction: row; justify-content: space-around; align-items: center; padding-top: env(safe-area-inset-top); }
            #time-display { font-size: 42vh; }
            .game-controls { flex-direction: column; max-width: 160px; }
        }

        #result-screen { background: #2c3e50; z-index: 15; overflow-y: auto; padding: 20px 10px; }
        #result-screen table { width: 100%; border-collapse: collapse; }
        #result-screen table th, #result-screen table td { text-align: center; padding: 12px 5px; border-bottom: 1px solid #eee; }

        #toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 0.9rem; z-index: 1000; opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }

        #custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-body { background: white; color: #333; padding: 25px; border-radius: 20px; width: 80%; max-width: 280px; text-align: center; }
        .blink { animation: blinker 0.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="toast">이미 전체화면 모드입니다.</div>

    <div id="custom-modal" class="hidden">
        <div class="modal-body">
            <div id="modal-msg" style="font-size: 1.1rem; font-weight: bold;">메시지</div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-cancel" style="flex:1; padding:12px; border-radius:10px; border:none; background:#eee;">취소</button>
                <button id="btn-confirm" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--bg-green); color:white;">확인</button>
            </div>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="setup-card">
            <h2 style="margin: 0 0 15px 0;">🎲 보드게임 타이머</h2>
            <div id="name-inputs"></div>
            <div style="display: flex; gap: 8px;">
                <select id="player-count" onchange="generateNameInputs()" style="flex:1">
                    <option value="2">2명</option><option value="3">3명</option>
                    <option value="4" selected>4명</option><option value="5">5명</option>
                </select>
                <select id="time-limit" style="flex:1">
                    <option value="30">30초</option><option value="60" selected>1분</option><option value="120">2분</option>
                </select>
            </div>
            <button class="btn-main" onclick="startGame()">게임 시작</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden" onclick="handleScreenTouch()">
        <div id="game-main-area">
            <div id="player-name-display">이름</div>
            <div id="time-display">60</div>
            <div style="font-weight: bold; opacity: 0.5; font-size: 0.9rem; margin-top: 10px;">터치: 다음 턴</div>
        </div>
        <div class="game-controls">
            <button class="btn-control" onclick="toggleFullscreen(event)">전체화면</button>
            <button class="btn-control" style="background:#f1c40f; color:#333; border:none;" onclick="showPlayerWinModal(event)">탈출!</button>
            <button class="btn-control" onclick="showEndGameModal(event)">종료</button>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div style="display: flex; flex-direction: column; align-items: center; width:100%;">
            <h2 style="color: white; margin-top: 10px;">📊 최종 기록</h2>
            <div style="width: 90%; background: white; border-radius: 15px; overflow: hidden; margin: 15px 0; color: #333;">
                <table style="width: 100%;">
                    <thead style="background: #f1f3f5;">
                        <tr><th>이름</th><th>결과</th><th>시간</th></tr>
                    </thead>
                    <tbody id="result-body"></tbody>
                </table>
            </div>
            <button class="btn-main" onclick="backToSetup()">새 게임 하기</button>
        </div>
    </div>

    <script>
        let players = [], currentPlayerIndex = 0, initialTime = 60, timeLeft = 60;
        let timerInterval = null, turnStartTime = 0, audioCtx = null, modalCallback = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(freq, dur, vol = 1.0) {
            initAudioContext();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function unlockAudio() {
            initAudioContext();
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer; source.connect(audioCtx.destination);
            source.start(0);
        }

        function toggleFullscreen(e) {
            if(e) e.stopPropagation();
            const doc = document.documentElement;
            const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

            if (isStandalone) { 
                showToast("이미 전체화면 모드입니다."); 
                return;
            }

            if (!document.fullscreenElement) {
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            } else {
                showToast("이미 전체화면 모드입니다.");
            }
        }

        function startGame() {
            unlockAudio();
            const count = document.getElementById('player-count').value;
            players = [];
            const savedNames = JSON.parse(sessionStorage.getItem('rummi_names')) || {};
            for(let i=1; i<=count; i++) {
                let name = document.getElementById(`p${i}`).value || `플레이어 ${i}`;
                players.push({ name: name, totalUsedTime: 0, isOut: false, winOrder: 0 });
                savedNames[`p${i}`] = name;
            }
            sessionStorage.setItem('rummi_names', JSON.stringify(savedNames));
            initialTime = parseInt(document.getElementById('time-limit').value);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            currentPlayerIndex = 0;
            startTurn();
        }

        function startTurn() {
            clearInterval(timerInterval);
            timeLeft = initialTime;
            turnStartTime = Date.now();
            updateUI();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 10 && timeLeft > 0) playSound(880, 0.1, 0.8);
                if (timeLeft <= 0) { clearInterval(timerInterval); playSound(440, 0.8, 1.0); }
            }, 1000);
        }

        function handleScreenTouch() {
            if (!document.getElementById('custom-modal').classList.contains('hidden')) return;
            unlockAudio();
            nextTurn();
        }

        function nextTurn() {
            const p = players[currentPlayerIndex];
            if (p) p.totalUsedTime += Math.round((Date.now() - turnStartTime) / 1000);
            playSound(1200, 0.2, 0.9);
            let attempts = 0;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                attempts++;
            } while (players[currentPlayerIndex].isOut && attempts < players.length);
            if (attempts >= players.length) showResults(); else startTurn();
        }

        function updateUI() {
            const display = document.getElementById('time-display'), screen = document.getElementById('game-screen'), nameDisplay = document.getElementById('player-name-display');
            display.innerText = timeLeft < 0 ? 0 : timeLeft;
            nameDisplay.innerText = players[currentPlayerIndex] ? players[currentPlayerIndex].name : "";
            screen.classList.remove('blink');
            if (timeLeft > 10) {
                const ratio = timeLeft / initialTime;
                screen.style.backgroundColor = ratio > 0.5 ? 'var(--bg-green)' : 'var(--bg-orange)';
            } else {
                screen.style.backgroundColor = 'var(--bg-red)';
                if (timeLeft <= 5 && timeLeft > 0) screen.classList.add('blink');
            }
        }

        function generateNameInputs() {
            const count = document.getElementById('player-count').value;
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            const savedNames = JSON.parse(sessionStorage.getItem('rummi_names')) || {};
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<input type="text" id="p${i}" value="${savedNames[`p${i}`] || ''}" placeholder="플레이어 ${i}">`;
            }
        }

        function backToSetup() {
            clearInterval(timerInterval);
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            generateNameInputs();
        }

        function showModal(msg, callback) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('custom-modal').classList.remove('hidden');
            modalCallback = callback;
        }
        document.getElementById('btn-confirm').onclick = (e) => { e.stopPropagation(); document.getElementById('custom-modal').classList.add('hidden'); if(modalCallback) modalCallback(); };
        document.getElementById('btn-cancel').onclick = (e) => { e.stopPropagation(); document.getElementById('custom-modal').classList.add('hidden'); };

        function showPlayerWinModal(e) { e.stopPropagation(); showModal(`${players[currentPlayerIndex].name}님 탈출 완료?`, () => { players[currentPlayerIndex].isOut = true; players[currentPlayerIndex].winOrder = players.filter(pl => pl.isOut).length; nextTurn(); }); }
        function showEndGameModal(e) { e.stopPropagation(); showModal("게임을 종료하시겠습니까?", showResults); }
        
        function showResults() {
            const p = players[currentPlayerIndex];
            if (p && !p.isOut) p.totalUsedTime += Math.round((Date.now() - turnStartTime) / 1000);
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const tbody = document.getElementById('result-body');
            const sorted = [...players].sort((a,b) => {
                if (a.isOut && b.isOut) return a.winOrder - b.winOrder;
                if (a.isOut) return -1;
                if (b.isOut) return 1;
                return a.totalUsedTime - b.totalUsedTime;
            });
            tbody.innerHTML = sorted.map((p) => {
                let resultText = p.isOut ? `<b>${p.winOrder}등</b>` : "종료";
                return `<tr><td>${p.name}</td><td>${resultText}</td><td>${Math.floor(p.totalUsedTime/60)}분 ${p.totalUsedTime%60}초</td></tr>`;
            }).join('');
        }
        generateNameInputs();
    </script>
</body>
</html>
