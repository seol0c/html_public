<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>보드게임 타이머</title>
    <style>
        :root { --bg-green: #27ae60; --bg-orange: #f39c12; --bg-red: #e74c3c; --bg-dark: #2c3e50; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: white; overflow: hidden; touch-action: manipulation; }
        
        .screen { width: 100vw; height: 100dvh; position: absolute; top: 0; left: 0; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }

        /* 1. 설정 화면 */
        #setup-screen { background: #34495e; z-index: 10; overflow-y: auto; padding-top: constant(safe-area-inset-top); padding-top: env(safe-area-inset-top); }
        .setup-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; margin: 40px auto; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        
        /* PC에서 늘어짐 방지 버튼 */
        .btn-main { background: var(--bg-green); color: white; border: none; padding: 16px; width: 100%; max-width: 260px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin: 15px auto; display: block; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.96); }

        /* 2. 게임 화면 */
        #game-screen { background-color: var(--bg-green); cursor: pointer; text-align: center; z-index: 5; transition: background-color 0.3s; padding: 20px; justify-content: center; }
        #player-name-display { font-size: 1.6rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 25px; border-radius: 50px; margin-bottom: 10px; }
        #time-display { font-weight: 900; line-height: 1; }
        
        .game-controls { display: flex; gap: 12px; z-index: 10; width: 100%; max-width: 400px; }
        .btn-control { padding: 14px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1rem; border: 2px solid white; color: white; background: rgba(255,255,255,0.25); flex: 1; backdrop-filter: blur(4px); }

        /* 세로 모드 대응 */
        @media (orientation: portrait) {
            #game-screen { flex-direction: column; justify-content: space-evenly; }
            #time-display { font-size: 38vw; }
            .game-controls { flex-direction: row; padding: 0 10px; }
        }

        /* 가로 모드 대응 */
        @media (orientation: landscape) {
            #game-screen { flex-direction: row; justify-content: space-around; align-items: center; }
            #game-main-area { flex: 1.2; }
            #time-display { font-size: 42vh; margin: 0; }
            .game-controls { flex: 0.8; flex-direction: column; max-width: 180px; }
            .btn-control { width: 100%; }
        }

        /* 3. 결과 화면: 스크롤 최적화 */
        #result-screen { background: #2c3e50; z-index: 15; overflow-y: auto; display: block; padding: 20px 10px; }
        .result-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .table-wrapper { width: 100%; max-width: 450px; background: white; border-radius: 15px; overflow: hidden; margin: 15px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; color: #333; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f1f3f5; font-size: 0.85rem; color: #666; }

        /* 모달 */
        #custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-body { background: white; color: #333; padding: 25px; border-radius: 20px; width: 80%; max-width: 280px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .blink { animation: blinker 0.7s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="custom-modal" class="hidden">
        <div class="modal-body">
            <div id="modal-msg" style="font-size: 1.1rem; font-weight: bold; line-height: 1.4;">메시지</div>
            <div class="modal-btns">
                <button id="btn-cancel" class="modal-btn" style="background:#f1f3f5; color:#666;">취소</button>
                <button id="btn-confirm" class="modal-btn" style="background:var(--bg-green); color:white;">확인</button>
            </div>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="setup-card">
            <h2 style="margin: 0 0 15px 0;">🎲 보드게임 타이머</h2>
            <div id="name-inputs"></div>
            <div style="display: flex; gap: 8px;">
                <select id="player-count" onchange="generateNameInputs()" style="flex:1">
                    <option value="2">2명</option><option value="3">3명</option>
                    <option value="4" selected>4명</option><option value="5">5명</option>
                </select>
                <select id="time-limit" style="flex:1">
                    <option value="30">30초</option><option value="60" selected>1분</option><option value="120">2분</option>
                </select>
            </div>
            <button class="btn-main" onclick="startGame()">게임 시작</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden" onclick="nextTurn()">
        <div id="game-main-area">
            <div id="player-name-display">이름</div>
            <div id="time-display">60</div>
            <div style="font-weight: bold; opacity: 0.6; font-size: 0.9rem;">터치: 다음 턴</div>
        </div>
        <div class="game-controls">
            <button class="btn-control" style="background:#f1c40f; color:#333; border:none;" onclick="showPlayerWinModal(event)">나 탈출!</button>
            <button class="btn-control" onclick="showEndGameModal(event)">종료</button>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="result-container">
            <h2 style="color: white; margin-top: 10px;">📊 최종 기록</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>순위</th><th>이름</th><th>결과</th><th>시간</th></tr>
                    </thead>
                    <tbody id="result-body"></tbody>
                </table>
            </div>
            <button class="btn-main" onclick="backToSetup()">새 게임 하기</button>
        </div>
    </div>

    <script>
        let players = [], currentPlayerIndex = 0, initialTime = 60, timeLeft = 60;
        let timerInterval = null, turnStartTime = 0, audioCtx = null, modalCallback = null;

        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(() => {}); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }

        function playDing(freq, dur) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function showModal(msg, callback) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('custom-modal').classList.remove('hidden');
            modalCallback = callback;
        }

        document.getElementById('btn-confirm').onclick = (e) => { e.stopPropagation(); document.getElementById('custom-modal').classList.add('hidden'); if(modalCallback) modalCallback(); };
        document.getElementById('btn-cancel').onclick = (e) => { e.stopPropagation(); document.getElementById('custom-modal').classList.add('hidden'); };

        function generateNameInputs() {
            const count = document.getElementById('player-count').value;
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            const savedNames = JSON.parse(sessionStorage.getItem('rummi_names')) || {};
            for(let i=1; i<=count; i++) {
                const savedName = savedNames[`p${i}`] || ""; 
                container.innerHTML += `<input type="text" id="p${i}" value="${savedName}" placeholder="플레이어 ${i}" onfocus="this.select()">`;
            }
        }

        function startGame() {
            openFullscreen();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const count = document.getElementById('player-count').value;
            players = [];
            const sessionNames = {};
            for(let i=1; i<=count; i++) {
                let nameValue = document.getElementById(`p${i}`).value || `플레이어 ${i}`;
                players.push({ name: nameValue, totalUsedTime: 0, isOut: false, winOrder: 0 });
                sessionNames[`p${i}`] = nameValue;
            }
            sessionStorage.setItem('rummi_names', JSON.stringify(sessionNames));
            initialTime = parseInt(document.getElementById('time-limit').value);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            currentPlayerIndex = 0;
            startTurn();
        }

        function startTurn() {
            const activePlayers = players.filter(p => !p.isOut);
            if (activePlayers.length === 0) { showResults(); return; }
            timeLeft = initialTime;
            turnStartTime = Date.now();
            updateUI();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--; updateUI();
                if(timeLeft <= 0) { clearInterval(timerInterval); playDing(440, 0.5); }
            }, 1000);
        }

        function nextTurn() {
            if (!document.getElementById('custom-modal').classList.contains('hidden')) return;
            const p = players[currentPlayerIndex];
            p.totalUsedTime += Math.round((Date.now() - turnStartTime) / 1000);
            playDing(800, 0.1); 
            if (navigator.vibrate) navigator.vibrate(40);
            let attempts = 0;
            do { currentPlayerIndex = (currentPlayerIndex + 1) % players.length; attempts++; } while (players[currentPlayerIndex].isOut && attempts < players.length);
            if (attempts >= players.length) showResults(); else startTurn();
        }

        function showPlayerWinModal(e) {
            e.stopPropagation();
            showModal(`${players[currentPlayerIndex].name}님, 탈출 성공인가요?`, () => {
                players[currentPlayerIndex].isOut = true;
                players[currentPlayerIndex].totalUsedTime += Math.round((Date.now() - turnStartTime) / 1000);
                players[currentPlayerIndex].winOrder = players.filter(pl => pl.isOut).length;
                nextTurn();
            });
        }

        function showEndGameModal(e) { e.stopPropagation(); showModal("게임을 종료하고 결과를 확인하시겠습니까?", showResults); }

        function updateUI() {
            const display = document.getElementById('time-display'), screen = document.getElementById('game-screen'), nameDisplay = document.getElementById('player-name-display');
            display.innerText = timeLeft < 0 ? 0 : timeLeft;
            nameDisplay.innerText = players[currentPlayerIndex].name;
            const ratio = timeLeft / initialTime;
            screen.classList.remove('blink');
            if(ratio > 0.5) screen.style.backgroundColor = 'var(--bg-green)';
            else if(ratio > 0.2) screen.style.backgroundColor = 'var(--bg-orange)';
            else { screen.style.backgroundColor = 'var(--bg-red)'; if(timeLeft <= 5 && timeLeft >= 0) screen.classList.add('blink'); }
        }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const tbody = document.getElementById('result-body');
            const displayList = [...players].sort((a, b) => {
                if (a.isOut && b.isOut) return a.winOrder - b.winOrder;
                if (a.isOut) return -1;
                if (b.isOut) return 1;
                return b.totalUsedTime - a.totalUsedTime;
            });
            tbody.innerHTML = displayList.map((p, idx) => {
                let res = p.isOut ? `<b style="color:#27ae60">${p.winOrder}등</b>` : "게임 종료";
                return `<tr><td>${idx+1}</td><td>${p.name}</td><td>${res}</td><td>${Math.floor(p.totalUsedTime/60)}분 ${p.totalUsedTime%60}초</td></tr>`;
            }).join('');
        }

        function backToSetup() { 
            document.getElementById('result-screen').classList.add('hidden'); 
            document.getElementById('setup-screen').classList.remove('hidden'); 
            generateNameInputs(); 
        }
        generateNameInputs();
    </script>
</body>
</html>
